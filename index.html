<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Zews — Links</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after {
      margin: 0; padding: 0; box-sizing: border-box;
    }

    html, body {
      height: 100%; width: 100%;
      font-family: 'Inter', sans-serif;
      background: #06000e;
      overflow-x: hidden;
    }

    /* ═══════════════════════════════════
       AURORA BACKGROUND
    ═══════════════════════════════════ */
    .aurora-bg {
      position: fixed; inset: 0; z-index: 0;
      background: #06000e; overflow: hidden;
    }

    .aurora-1 {
      position: absolute;
      width: 200%; height: 200%;
      top: -50%; left: -50%;
      background: conic-gradient(
        from 0deg at 40% 50%,
        #6600ff 0deg,
        #0055ff 80deg,
        #ff0099 160deg,
        #ffaa00 220deg,
        #6600ff 360deg
      );
      filter: blur(100px);
      opacity: 0.2;
      animation: rot1 20s linear infinite;
    }

    .aurora-2 {
      position: absolute;
      width: 180%; height: 180%;
      top: -40%; left: -40%;
      background: conic-gradient(
        from 200deg at 60% 55%,
        #aa00ff 0deg,
        #0088ff 90deg,
        #ff0066 180deg,
        #ff8800 270deg,
        #aa00ff 360deg
      );
      filter: blur(120px);
      opacity: 0.16;
      animation: rot1 28s linear infinite reverse;
    }

    .aurora-3 {
      position: absolute; inset: 0;
      background:
        radial-gradient(ellipse 70% 55% at 15% 25%, rgba(130,0,255,0.4) 0%, transparent 70%),
        radial-gradient(ellipse 60% 50% at 82% 72%, rgba(0,80,255,0.32) 0%, transparent 70%),
        radial-gradient(ellipse 55% 45% at 50% 5%, rgba(255,0,130,0.22) 0%, transparent 70%),
        radial-gradient(ellipse 40% 35% at 88% 18%, rgba(255,170,0,0.14) 0%, transparent 70%);
      filter: blur(35px);
      animation: aurora3 14s ease-in-out infinite alternate;
    }

    @keyframes rot1 {
      from { transform: rotate(0deg); }
      to   { transform: rotate(360deg); }
    }
    @keyframes aurora3 {
      0%   { opacity: 0.55; transform: scale(1)    translate(0%,   0%);   }
      33%  { opacity: 0.80; transform: scale(1.06) translate(2%,  -2%);  }
      66%  { opacity: 0.60; transform: scale(0.96) translate(-2%,  3%);  }
      100% { opacity: 0.75; transform: scale(1.04) translate(1%,  -1%);  }
    }

    /* ═══════════════════════════════════
       BLOBS
    ═══════════════════════════════════ */
    .blob {
      position: fixed; border-radius: 50%; pointer-events: none;
      filter: blur(90px); z-index: 0;
    }
    .b1 { width: 550px; height: 550px; background: #7700ff; top: -180px; left: -180px; opacity: 0.12; animation: blob 30s ease-in-out infinite; }
    .b2 { width: 430px; height: 430px; background: #0044ff; bottom: -120px; right: -120px; opacity: 0.11; animation: blob 24s ease-in-out infinite reverse; animation-delay: -11s; }
    .b3 { width: 320px; height: 320px; background: #ff0077; top: 48%; left: 55%; opacity: 0.09; animation: blob 38s ease-in-out infinite; animation-delay: -19s; }
    .b4 { width: 240px; height: 240px; background: #ffaa00; top: 12%; right: 8%;  opacity: 0.07; animation: blob 22s ease-in-out infinite; animation-delay: -6s; }
    .b5 { width: 200px; height: 200px; background: #ff44aa; bottom: 18%; left: 6%;  opacity: 0.08; animation: blob 28s ease-in-out infinite reverse; animation-delay: -15s; }

    @keyframes blob {
      0%, 100% { transform: translate(0,   0)   scale(1);    }
      20%       { transform: translate(28px,-35px) scale(1.04);  }
      40%       { transform: translate(-22px,18px) scale(0.96);  }
      60%       { transform: translate(32px, 28px) scale(1.03);  }
      80%       { transform: translate(-18px,-22px) scale(1.06); }
    }

    /* ═══════════════════════════════════
       SPARKLES
    ═══════════════════════════════════ */
    .sparkle {
      position: fixed; border-radius: 50%; pointer-events: none; z-index: 0;
      animation: sparkFade 4s ease-in-out infinite;
    }
    @keyframes sparkFade {
      0%, 100% { opacity: 0; transform: scale(0.4); }
      50%       { opacity: 0.75; transform: scale(1); }
    }

    /* ═══════════════════════════════════
       PAGE WRAPPER
    ═══════════════════════════════════ */
    .page {
      position: relative; z-index: 1;
      min-height: 100vh; width: 100%;
      display: flex; align-items: center; justify-content: center;
      padding: 52px 24px;
    }

    /* ═══════════════════════════════════
       LAYOUT
    ═══════════════════════════════════ */
    .layout {
      display: flex; align-items: center; justify-content: center;
      gap: 68px; max-width: 1080px; width: 100%;
      animation: fadeUp 0.9s cubic-bezier(0.23,1,0.32,1) both;
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(44px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ═══════════════════════════════════
       LEFT IMAGE
    ═══════════════════════════════════ */
    .side-img {
      flex-shrink: 0;
      width: 265px; height: 420px; border-radius: 30px; overflow: hidden;
      position: relative;
      border: 1px solid rgba(255,255,255,0.12);
      animation: fadeLeft 1s cubic-bezier(0.23,1,0.32,1) both 0.2s, glowPulse 6s ease-in-out infinite alternate;
      cursor: default;
    }

    .side-img::before {
      content: ''; position: absolute; inset: -3px; border-radius: 33px; z-index: -1;
      background: linear-gradient(135deg, rgba(110,0,255,0.7), rgba(0,80,255,0.5), rgba(255,0,120,0.6));
      filter: blur(10px); opacity: 0.65;
      animation: borderPulse 6s ease-in-out infinite alternate;
    }

    .side-img::after {
      content: ''; position: absolute; inset: 0; border-radius: 30px;
      background: linear-gradient(to bottom, transparent 50%, rgba(0,0,0,0.6) 100%);
      z-index: 2; pointer-events: none;
    }

    .side-img img {
      width: 100%; height: 100%; object-fit: cover; display: block;
      transition: transform 0.6s ease;
    }
    .side-img:hover img { transform: scale(1.05); }

    @keyframes glowPulse {
      0%   { box-shadow: 0 0 45px rgba(110,0,255,0.5),  0 0 90px rgba(0,70,255,0.2); }
      50%  { box-shadow: 0 0 75px rgba(255,0,110,0.42), 0 0 140px rgba(110,0,255,0.28); }
      100% { box-shadow: 0 0 65px rgba(0,100,255,0.55), 0 0 110px rgba(255,0,110,0.22), 0 0 190px rgba(255,160,0,0.1); }
    }
    @keyframes borderPulse { 0% { opacity:0.45; } 100% { opacity:0.9; } }
    @keyframes fadeLeft {
      from { opacity: 0; transform: translateX(-55px); }
      to   { opacity: 1; transform: translateX(0); }
    }

    /* ═══════════════════════════════════
       PROFILE
    ═══════════════════════════════════ */
    .profile {
      display: flex; flex-direction: column; align-items: center;
      gap: 18px; max-width: 480px; width: 100%;
      animation: fadeRight 1s cubic-bezier(0.23,1,0.32,1) both 0.15s;
    }
    @keyframes fadeRight {
      from { opacity: 0; transform: translateX(55px); }
      to   { opacity: 1; transform: translateX(0); }
    }

    /* ─ Avatar Ring ─ */
    .av-wrap {
      position: relative; width: 110px; height: 110px; flex-shrink: 0;
    }
    .av-glow {
      position: absolute; inset: -10px; border-radius: 50%;
      background: conic-gradient(from 0deg, #7700ff, #0066ff, #ff0099, #ffaa00, #7700ff);
      filter: blur(16px); opacity: 0.5; z-index: -1;
      animation: ringRot 3s linear infinite;
    }
    .av-ring {
      position: absolute; inset: 0; border-radius: 50%;
      background: conic-gradient(from 0deg, #7700ff, #0066ff, #ff0099, #ffaa00, #7700ff);
      animation: ringRot 3s linear infinite;
    }
    .av-inner {
      position: absolute; inset: 3px; border-radius: 50%; overflow: hidden;
      border: 2px solid #06000e;
      box-shadow: 0 0 22px rgba(119,0,255,0.55), inset 0 0 12px rgba(0,0,0,0.5);
    }
    .av-inner img { width: 100%; height: 100%; object-fit: cover; display: block; }
    @keyframes ringRot {
      from { transform: rotate(0deg); }
      to   { transform: rotate(360deg); }
    }

    /* ─ Name ─ */
    .name {
      font-size: 2.3rem; font-weight: 900; text-align: center;
      letter-spacing: -0.03em;
      background: linear-gradient(135deg, #fff 0%, #d0a8ff 45%, #a8d0ff 100%);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      background-clip: text;
      filter: drop-shadow(0 0 22px rgba(180,100,255,0.55));
      animation: nameGlow 4s ease-in-out infinite alternate;
    }
    @keyframes nameGlow {
      0%   { filter: drop-shadow(0 0 14px rgba(180,100,255,0.4)); }
      100% { filter: drop-shadow(0 0 38px rgba(100,180,255,0.65)); }
    }

    /* ─ Bio ─ */
    .bio {
      font-size: 0.92rem; font-weight: 400; color: rgba(255,255,255,0.5);
      text-align: center; line-height: 1.7; max-width: 340px; letter-spacing: 0.01em;
    }

    /* ─ Divider ─ */
    .divider {
      width: 64px; height: 2px; border-radius: 99px;
      background: linear-gradient(90deg, transparent, rgba(160,80,255,0.75), rgba(80,160,255,0.75), transparent);
    }

    /* ═══════════════════════════════════
       BUTTONS
    ═══════════════════════════════════ */
    .buttons { display: flex; flex-direction: column; gap: 12px; width: 100%; }

    .btn {
      display: flex; align-items: center; gap: 16px;
      padding: 14px 20px 14px 15px; border-radius: 50px;
      text-decoration: none;
      background: rgba(255,255,255,0.055);
      backdrop-filter: blur(28px); -webkit-backdrop-filter: blur(28px);
      border: 1px solid rgba(255,255,255,0.1);
      cursor: pointer; position: relative; overflow: hidden;
      transition:
        transform      0.38s cubic-bezier(0.23,1,0.32,1),
        box-shadow     0.38s cubic-bezier(0.23,1,0.32,1),
        border-color   0.38s ease,
        background     0.38s ease;
      animation: btnIn 0.7s cubic-bezier(0.23,1,0.32,1) both;
    }
    .btn:nth-child(1) { animation-delay: 0.45s; }
    .btn:nth-child(2) { animation-delay: 0.57s; }
    .btn:nth-child(3) { animation-delay: 0.69s; }
    .btn:nth-child(4) { animation-delay: 0.81s; }
    @keyframes btnIn {
      from { opacity: 0; transform: translateY(22px) scale(0.96); }
      to   { opacity: 1; transform: translateY(0)    scale(1);    }
    }

    /* glass overlay */
    .btn::before {
      content: ''; position: absolute; inset: 0; border-radius: 50px;
      background: linear-gradient(115deg, rgba(255,255,255,0.07) 0%, rgba(255,255,255,0) 100%);
      opacity: 0; transition: opacity 0.38s ease;
    }
    .btn:hover::before { opacity: 1; }

    /* shimmer sweep */
    .btn::after {
      content: ''; position: absolute;
      top: 0; left: -110%; width: 55%; height: 100%;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.08), transparent);
      transform: skewX(-18deg);
      transition: left 0.6s ease;
    }
    .btn:hover::after { left: 170%; }

    .btn:hover {
      transform: translateY(-5px) scale(1.025);
      background: rgba(255,255,255,0.09);
    }
    .btn:active { transform: translateY(-2px) scale(1.01); }

    /* per-platform glow */
    .of:hover  { border-color: rgba(0,174,239,0.5);  box-shadow: 0 10px 45px rgba(0,174,239,0.38), 0 3px 14px rgba(0,174,239,0.22); }
    .yt:hover  { border-color: rgba(255,40,40,0.5);  box-shadow: 0 10px 45px rgba(255,40,40,0.38),  0 3px 14px rgba(255,40,40,0.22);  }
    .tt:hover  { border-color: rgba(105,201,208,0.5); box-shadow: 0 10px 45px rgba(105,201,208,0.32), 0 3px 14px rgba(254,44,85,0.28); }
    .dc:hover  { border-color: rgba(88,101,242,0.55); box-shadow: 0 10px 45px rgba(88,101,242,0.42),  0 3px 14px rgba(88,101,242,0.25); }

    /* icon box */
    .btn-icon {
      width: 46px; height: 46px; border-radius: 15px; flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
      background: rgba(255,255,255,0.09);
      border: 1px solid rgba(255,255,255,0.1);
      overflow: hidden;
      transition: transform 0.38s cubic-bezier(0.23,1,0.32,1), background 0.38s ease;
    }
    .btn:hover .btn-icon { transform: rotate(-6deg) scale(1.12); background: rgba(255,255,255,0.16); }

    .btn-icon img { width: 28px; height: 28px; object-fit: contain; }

    /* text */
    .btn-text { flex: 1; display: flex; flex-direction: column; gap: 3px; }
    .btn-title { font-size: 0.93rem; font-weight: 700; color: #fff; letter-spacing: 0.01em; }
    .btn-desc  { font-size: 0.76rem; font-weight: 400; color: rgba(255,255,255,0.42); }

    /* arrow */
    .btn-arrow {
      font-size: 1.1rem; color: rgba(255,255,255,0.3); flex-shrink: 0;
      transition: transform 0.38s ease, color 0.38s ease, opacity 0.38s ease;
      opacity: 0.4;
    }
    .btn:hover .btn-arrow { transform: translateX(6px); color: #fff; opacity: 1; }

    /* ═══════════════════════════════════
       FOOTER
    ═══════════════════════════════════ */
    .footer {
      margin-top: 6px; font-size: 0.71rem; color: rgba(255,255,255,0.18);
      text-align: center; letter-spacing: 0.07em; text-transform: uppercase;
    }

    /* ═══════════════════════════════════
       RESPONSIVE
    ═══════════════════════════════════ */
    @media (max-width: 840px) {
      .layout    { flex-direction: column; gap: 38px; }
      .side-img  { width: 185px; height: 265px; border-radius: 22px; }
      .side-img::before { border-radius: 25px; }
      .name      { font-size: 1.9rem; }
      .profile   { gap: 15px; }
    }
    @media (max-width: 500px) {
      .page      { padding: 36px 18px; }
      .side-img  { width: 155px; height: 225px; border-radius: 18px; }
      .av-wrap   { width: 92px; height: 92px; }
      .name      { font-size: 1.65rem; }
      .btn       { padding: 12px 15px 12px 12px; }
      .btn-icon  { width: 40px; height: 40px; border-radius: 12px; }
      .btn-icon img { width: 24px; height: 24px; }
    }
  </style>
</head>
<body>

  <!-- ── Aurora Background ── -->
  <div class="aurora-bg">
    <div class="aurora-1"></div>
    <div class="aurora-2"></div>
    <div class="aurora-3"></div>
  </div>

  <!-- ── Blobs ── -->
  <div class="blob b1"></div>
  <div class="blob b2"></div>
  <div class="blob b3"></div>
  <div class="blob b4"></div>
  <div class="blob b5"></div>

  <!-- ── Sparkles (injected via JS) ── -->

  <!-- ── Page ── -->
  <div class="page">
    <div class="layout">

      <!-- Left Image -->
      <div class="side-img">
        <img src="pfp.png" alt="Profile visual" />
      </div>

      <!-- Profile -->
      <div class="profile">

        <!-- Avatar -->
        <div class="av-wrap">
          <div class="av-glow"></div>
          <div class="av-ring"></div>
          <div class="av-inner">
            <img src="pfp.png" alt="Profile" />
          </div>
        </div>

        <!-- Name -->
        <h1 class="name">Zews</h1>

        <!-- Bio -->
        <p class="bio">Content creator &amp; digital personality.<br>All my links — right here 👇</p>

        <!-- Divider -->
        <div class="divider"></div>

        <!-- Buttons -->
        <div class="buttons">

          <a href="https://onlyfans.wtf/zews" target="_blank" rel="noopener noreferrer" class="btn of">
            <div class="btn-icon">
              <img src="only.png" alt="OnlyFans" />
            </div>
            <div class="btn-text">
              <span class="btn-title">OnlyFans</span>
              <span class="btn-desc">Exclusive content you won't find anywhere else</span>
            </div>
            <span class="btn-arrow">&#8594;</span>
          </a>

          <a href="https://www.youtube.com/@NiceRizz" target="_blank" rel="noopener noreferrer" class="btn yt">
            <div class="btn-icon">
              <img src="youtube.png" alt="YouTube" />
            </div>
            <div class="btn-text">
              <span class="btn-title">YouTube</span>
              <span class="btn-desc">Watch my latest videos &amp; vlogs</span>
            </div>
            <span class="btn-arrow">&#8594;</span>
          </a>

          <a href="https://www.tiktok.com/@mstttt61" target="_blank" rel="noopener noreferrer" class="btn tt">
            <div class="btn-icon">
              <img src="tiktok.png" alt="TikTok" />
            </div>
            <div class="btn-text">
              <span class="btn-title">TikTok</span>
              <span class="btn-desc">Daily content &amp; viral moments</span>
            </div>
            <span class="btn-arrow">&#8594;</span>
          </a>

          <a href="https://discord.gg/bBFrCtxZ4S" target="_blank" rel="noopener noreferrer" class="btn dc">
            <div class="btn-icon">
              <img src="discord.png" alt="Discord" />
            </div>
            <div class="btn-text">
              <span class="btn-title">Discord</span>
              <span class="btn-desc">Join the community &amp; chat with me</span>
            </div>
            <span class="btn-arrow">&#8594;</span>
          </a>

        </div>

        <p class="footer">&copy; 2026 Zews &middot; All rights reserved</p>
      </div>
    </div>
  </div>

  <script>
    // ── Inject sparkles ──
    const colors = ['#aa66ff','#66aaff','#ff66aa','#ffcc66','#ffffff'];
    for (let i = 0; i < 22; i++) {
      const s = document.createElement('div');
      s.className = 'sparkle';
      const size = Math.random() * 4 + 2;
      const color = colors[Math.floor(Math.random() * colors.length)];
      const delay = (Math.random() * 5).toFixed(2);
      const dur   = (3 + Math.random() * 3).toFixed(2);
      s.style.cssText = `
        width:${size}px; height:${size}px;
        top:${(Math.random()*100).toFixed(1)}%;
        left:${(Math.random()*100).toFixed(1)}%;
        background:${color};
        box-shadow:0 0 ${(size*3).toFixed(0)}px ${color};
        animation-delay:${delay}s;
        animation-duration:${dur}s;
      `;
      document.body.appendChild(s);
    }
  </script>

</body>
</html>
